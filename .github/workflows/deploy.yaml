name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: |
          git lfs install
          git lfs pull
          git lfs checkout

      - name: Verify model exists
        run: |
          ls -lh models/bioclinicalbert_final/
          head -n 5 models/bioclinicalbert_final/tokenizer_config.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure project
        run: gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and push container
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/clinical-nlp-api \
            --async

      - name: Wait for build
        run: |
          BUILD_ID=$(gcloud builds list --limit=1 --format="value(id)")
          while [[ "$(gcloud builds describe $BUILD_ID --format='value(status)')" == "WORKING" ]]; do
            sleep 5
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy clinical-nlp-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/clinical-nlp-api \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --timeout 300